apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-frontend
  template:
    metadata:
      labels:
        app: employee-frontend
    spec:
      containers:
      - name: employee-frontend
        image: varungummadi/employee-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000